# String for model factory
model_str: "vggt"
# Model config
model_config:
  name: "vggt"
  # HF model string
  hf_model_name: "facebook/VGGT-1B"
# Image Normalization Type — VGGT expects raw [0, 1] images
data_norm_type: "dummy"
# VGGT checkpoint is loaded from HF Hub by the inference wrapper
pretrained: null
# Torch hub force reload
torch_hub_force_reload: False
test_resolution: [518, 336]
postprocessing:
  similarity_refine_mode: "sub_scene" # "depth" uses affine depth refinement; "sub_scene" uses similarity refinement
  isAlignWithGT: true
  isConsistencyCheck: true
  isJustCompareNearDistance: false
  maximum_near_distance: 10 # unit metter
  sub_scene:
    isAlignSubScenesSequential: true # whether to align sub scenes sequentially
    gt_align_method: "depth_pixel_sim3" # GT alignment: "pointcloud_icp" (Open3D ICP vs GT_pointcloud) or "depth_pixel_sim3" (weighted Sim(3) Umeyama on per-pixel pred-vs-GT_depth correspondences)
    similarity_refine_use_pose_init: true # use all pred/GT pose pairs to initialize scene similarity alignment
