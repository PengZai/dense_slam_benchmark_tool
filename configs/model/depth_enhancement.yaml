defaults:
  - _self_
  - /model@depth_model: depth_anything_v2

  
model_str: "depth_enhancement"

model_config:
  name: "depth_enhancement"
  depth_model_config: "${model.depth_model}"
  K_NN_for_uv: 6
  knn_feature_mode: "uv"
  weight_z: 1.0
  res_thresh: 0.1
  knn_depth_norm_thresh: 2.0
  confidence_alpha: 10.0
  confidence_beta: 1.0
  confidence_eps: 1.0e-8
  debug: False

# Image Normalization Type
data_norm_type: "${model.depth_model.data_norm_type}"
# Torch hub force reload
torch_hub_force_reload: "${model.depth_model.torch_hub_force_reload}"
# test resolution
test_resolution: "${model.depth_model.test_resolution}"
postprocessing:
  isAlignWithGT: False
  similarity_refine_mode: "depth" # "depth" uses affine depth refinement; "sub_scene" uses similarity refinement
  isConsistencyCheck: True
  isJustCompareNearDistance: False
  maximum_near_distance: 10 # unit metter
  sub_scene:
    isAlignSubScenesSequential: true # whether to align sub scenes sequentially
    gt_align_method: "depth_pixel_sim3" # GT alignment: "pointcloud_icp" (Open3D ICP vs GT_pointcloud) or "depth_pixel_sim3" (weighted Sim(3) Umeyama on per-pixel pred-vs-GT_depth correspondences)
    similarity_refine_use_pose_init: true # use all pred/GT pose pairs to initialize sub_scene similarity alignment
