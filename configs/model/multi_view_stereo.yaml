# String for model factory
model_str: "multi_view_stereo"
# Model config
model_config:
  name: "mvs"
  half_ws : 2
  debug_plot: false
  start_match_u: 0
  start_match_v: 0
  ACCEPTABLE_MINI_COST: 10
  ACCEPTABLE_COST_DIFF: 4
  ACCEPTABLE_DEPTH_PARAMETER: 0.05
  MAXIMUM_AGGREAGTE_COST_PENALTY: 6
  MAXIMUM_RECONSTRUCTION_DISTANCE: 0.8
  MAXIMUM_EXTENSION: 3
  MINIMUM_CORRECT_CONSISTENCY_CHECK: 2
  min_depth: 1.0
  max_depth: 1000

# Image Normalization Type
data_norm_type: "unchange"
# test resolution
test_resolution: [512, 336]
postprocessing:
  isAlignWithGT: false
  similarity_refine_mode: "sub_scene" # "depth" uses affine depth refinement; "sub_scene" uses similarity refinement
  isConsistencyCheck: false
  isJustCompareNearDistance: true
  maximum_near_distance: 10 # unit metter
  sub_scene:
    isAlignSubScenesSequential: true # whether to align sub scenes sequentially
    gt_align_method: "pointcloud_icp" # GT alignment: "pointcloud_icp" (Open3D ICP vs GT_pointcloud) or "depth_pixel_sim3" (weighted Sim(3) Umeyama on per-pixel pred-vs-GT_depth correspondences)
    similarity_refine_use_pose_init: true # use all pred/GT pose pairs to initialize sub_scene similarity alignment
